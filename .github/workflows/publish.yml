name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Package
    if: github.repository == 'KingInYellows/codemachine-pipeline'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          ref: ${{ github.event.release.target_commitish || github.ref }}

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kinginyellows'
          enable-preflight: 'false'

      - name: Verify package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $PACKAGE_VERSION"

      - name: Check version not already published
        run: |
          VERSION=$(node -p "require('./package.json').version")
          set +e
          VIEW_OUTPUT=$(npm view "@kinginyellows/codemachine-pipeline@${VERSION}" version 2>&1)
          VIEW_STATUS=$?
          set -e
          if [ "$VIEW_STATUS" -eq 0 ]; then
            echo "ERROR: Version ${VERSION} already published"
            exit 1
          fi
          if printf '%s' "$VIEW_OUTPUT" | grep -q 'E404'; then
            echo "Version ${VERSION} not yet published, proceeding"
          else
            printf '%s\n' "$VIEW_OUTPUT"
            echo "ERROR: Unable to determine whether ${VERSION} is already published"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: |
          npm pack --dry-run
          test -f "bin/run.js" || {
            echo "ERROR: bin/run.js not found"
            exit 1
          }

      - name: Run security audit
        run: npm audit --production --audit-level=high || echo "Audit warnings present"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published package
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          for i in 1 2 3; do
            sleep 10
            if npm view "@kinginyellows/codemachine-pipeline@${PACKAGE_VERSION}" version 2>/dev/null; then
              echo "Package ${PACKAGE_VERSION} verified on registry"
              exit 0
            fi
            echo "Attempt $i: package not yet visible, retrying..."
          done
          echo "ERROR: Package not visible after 30s"
          exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
