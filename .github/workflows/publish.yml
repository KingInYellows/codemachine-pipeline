name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Package
    if: github.repository == 'KingInYellows/codemachine-pipeline'
    runs-on: [self-hosted, linux]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          ref: ${{ github.event.release.target_commitish || github.ref }}

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kinginyellows'
          enable-preflight: 'false'

      - name: Verify package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $PACKAGE_VERSION"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: |
          npm pack --dry-run
          test -f "bin/run.js" || {
            echo "ERROR: bin/run.js not found"
            exit 1
          }

      - name: Run security audit
        run: npm audit --production --audit-level=high || echo "Audit warnings present"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published package
        run: |
          sleep 5
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          npm view "@kinginyellows/codemachine-pipeline@${PACKAGE_VERSION}" version || echo "Package propagation pending"
