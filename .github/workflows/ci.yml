name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

jobs:
  optimize_ci:
    runs-on: self-hosted
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@main
        with:
          graphite_token: ${{ secrets.GRAPHITE_TOKEN }}

  test:
    name: Test and Lint
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: self-hosted
    env:
      OCLIF_SKIP_MANIFEST: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run security advisory guard
        run: npm run security:glob-guard

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Run smoke tests
        run: ./scripts/tooling/smoke_execution.sh
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  docker:
    name: Docker Build
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: self-hosted
    env:
      OCLIF_SKIP_MANIFEST: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ai-feature-pipeline:test .

      - name: Test Docker image
        run: |
          docker run --rm ai-feature-pipeline:test --version || true
          docker run --rm ai-feature-pipeline:test --help

      - name: Cleanup
        if: always()
        run: |
          docker rmi ai-feature-pipeline:test || true
