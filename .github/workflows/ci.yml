name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  optimize_ci:
    runs-on: self-hosted
    outputs:
      skip: ${{ steps.check_skip.outputs.skip || 'false' }}
    steps:
      - name: Optimize CI
        id: check_skip
        continue-on-error: true
        uses: withgraphite/graphite-ci-action@v0.0.9
        with:
          graphite_token: ${{ secrets.GRAPHITE_TOKEN }}

  test:
    name: Test and Lint
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: self-hosted
    env:
      OCLIF_SKIP_MANIFEST: '1'
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.1.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Run smoke tests
        run: ./scripts/tooling/smoke_execution.sh
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        if: success()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  security_scan:
    name: security/scan
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: self-hosted
    env:
      OCLIF_SKIP_MANIFEST: '1'
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.1.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run security advisory guard
        run: npm run security:glob-guard

  docker:
    name: Docker Build
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: self-hosted
    env:
      OCLIF_SKIP_MANIFEST: '1'
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Docker image
        run: |
          docker build -t codemachine-pipeline:test .

      - name: Test Docker image
        run: |
          set -o pipefail
          docker run --rm codemachine-pipeline:test --version || true
          docker run --rm codemachine-pipeline:test --help
          docker run --rm codemachine-pipeline:test doctor --json | node -e "const fs=require('fs');JSON.parse(fs.readFileSync(0,'utf8'))" > /dev/null && echo 'doctor --json: valid JSON'

      - name: Cleanup
        if: always()
        run: |
          docker rmi codemachine-pipeline:test || true
