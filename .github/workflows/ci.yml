name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  optimize_ci:
    runs-on: [self-hosted, linux]
    timeout-minutes: 5
    env:
      GRAPHITE_TOKEN: ${{ secrets.GRAPHITE_TOKEN }}
    outputs:
      skip: ${{ steps.check_skip.outputs.skip || steps.default_skip.outputs.skip || 'false' }}
    steps:
      - name: Default skip flag
        id: default_skip
        run: echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Optimize CI
        id: check_skip
        if: github.event_name == 'pull_request' && env.GRAPHITE_TOKEN != ''
        # Pinned to v0.0.9 (9bc969adfd43bb790da3b64b543c78c75cef9689) for traceability.
        continue-on-error: true
        uses: withgraphite/graphite-ci-action@v0.0.9
        with:
          graphite_token: ${{ env.GRAPHITE_TOKEN }}

  workflow_lint:
    name: Workflow Lint
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          clean: true

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: '1.7.7'
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac
          archive="actionlint_${ACTIONLINT_VERSION}_${os}_${arch}.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          curl -fsSL "$url" -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint

      - name: Lint GitHub workflows
        run: ./actionlint -color

  test:
    name: Test and Lint
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: [self-hosted, linux]
    timeout-minutes: 45
    env:
      OCLIF_SKIP_MANIFEST: '1'
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          clean: true

      - name: Prepare npm directories
        run: |
          set -euo pipefail
          echo "HOME=$RUNNER_TEMP/codemachine-home" >> "$GITHUB_ENV"
          echo "NPM_CONFIG_CACHE=$RUNNER_TEMP/codemachine-npm-cache" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/codemachine-home" "$RUNNER_TEMP/codemachine-npm-cache"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.1.0
        with:
          node-version: '24'
          cache: npm

      - name: Runner preflight checks
        run: |
          set -euo pipefail
          node -v
          npm -v
          node -e "const major=Number(process.versions.node.split('.')[0]); if (major < 24) { console.error('Node 24+ is required for CI'); process.exit(1) }"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run security advisory guard
        run: npm run security:glob-guard

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Check circular dependencies
        run: npm run deps:check:ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Generate oclif manifest for drift check
        run: OCLIF_SKIP_MANIFEST='' node scripts/tooling/oclif_manifest.js

      - name: Validate CLI reference (drift check)
        run: npm run docs:cli:check

      - name: Validate API reference examples
        run: node scripts/tooling/validate_api_examples.js --check

      - name: Run smoke tests
        run: ./scripts/tooling/smoke_execution.sh
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        if: success()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  docker:
    name: Docker Build
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    env:
      OCLIF_SKIP_MANIFEST: '1'
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DOCKER_IMAGE: 'codemachine-pipeline:test-${{ github.run_id }}-${{ github.run_attempt }}'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.1.0
        with:
          node-version: '24'

      - name: Runner preflight checks
        id: docker_preflight
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "::warning::Docker is not available on this runner; skipping Docker Build job."
            echo "docker_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          docker version
          node -v
          echo "docker_available=true" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        if: steps.docker_preflight.outputs.docker_available == 'true'
        run: |
          docker build -t "$DOCKER_IMAGE" .

      - name: Test Docker image
        if: steps.docker_preflight.outputs.docker_available == 'true'
        run: |
          set -o pipefail
          docker run --rm "$DOCKER_IMAGE" --version || true
          docker run --rm "$DOCKER_IMAGE" --help
          # Note: doctor may exit 20 (environment issues in container), allow failure
          docker run --rm "$DOCKER_IMAGE" doctor --json | node -e "const fs=require('fs');JSON.parse(fs.readFileSync(0,'utf8'))" > /dev/null && echo 'doctor --json: valid JSON' || echo 'doctor check skipped (exit 20 in container)'

      - name: Cleanup
        if: always() && steps.docker_preflight.outputs.docker_available == 'true'
        run: |
          docker rmi "$DOCKER_IMAGE" || true
